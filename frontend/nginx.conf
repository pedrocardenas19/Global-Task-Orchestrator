server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Gzip compression
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
  gzip_min_length 1024;

  # Proxy API requests to the Rails backend container
  location /api/ {
    proxy_pass         http://backend:3000/api/;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }

  # Cache static assets aggressively (Angular adds content hash to filenames)
  location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|svg)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # Always serve index.html for Angular routing (SPA fallback)
  location / {
    try_files $uri $uri/ /index.html;
  }
}
